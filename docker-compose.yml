services:

  # ── ArsenalOT ───────────────────────────────────────────────
  arsenalot:
    build: .
    container_name: arsenalot-app
    # network_mode: host es necesario para que nmap y tshark vean las interfaces reales
    network_mode: host
    privileged: true
    volumes:
      - ./results:/app/results
      # Mount host's NetExec workspaces read-only so the exploitation tab can
      # import nxcdb data. When launched with `sudo docker-compose up`, $HOME
      # resolves to /root (usually empty), so prefer SUDO_USER's home and fall
      # back to $HOME. Override explicitly with ARSENAL_NXC_HOST_PATH in .env.
      - ${ARSENAL_NXC_HOST_PATH:-/home/${SUDO_USER:-${USER:-root}}/.nxc}:/root/.nxc:ro
    env_file:
      - path: .env
        required: false
    environment:
      - NEO4J_HOST=${NEO4J_HOST:-127.0.0.1}
      - NEO4J_PORT=${NEO4J_PORT:-7687}
      - NEO4J_USERNAME=${NEO4J_USERNAME:-neo4j}
      - NEO4J_PASSWORD=${NEO4J_PASSWORD:-neo4j123}
      - PWNDOC_URL=${PWNDOC_URL:-https://127.0.0.1:4242}
      - PWNDOC_USER=${PWNDOC_USER:-admin}
      - PWNDOC_PASSWORD=${PWNDOC_PASSWORD:-ArsenalOT2026!}
      - MARLINSPIKE_PUBLIC_URL=${MARLINSPIKE_PUBLIC_URL:-http://127.0.0.1:5001}
    restart: unless-stopped
    depends_on:
      - neo4j
      - marlinspike

  # ── Neo4j ────────────────────────────────────────────────────
  neo4j:
    image: neo4j:ubi9
    container_name: arsenalot-neo4j
    ports:
      - "7474:7474"   # Browser UI
      - "7687:7687"   # Bolt protocol
    environment:
      - NEO4J_AUTH=${NEO4J_USERNAME:-neo4j}/${NEO4J_PASSWORD:-neo4j123}
      - NEO4J_PLUGINS=["apoc"]
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    restart: unless-stopped

  # ── Neo4j Graph Viewer ───────────────────────────────────────
  # BloodHound-style graph explorer: http://localhost:7777
  neo4j-graph-viewer:
    build: ./neo4j-graph-viewer
    container_name: arsenalot-graph-viewer
    ports:
      - "7777:80"
    environment:
      # The browser JS connects to Neo4j via HTTP REST API (no WebSocket)
      - NEO4J_HTTP_URL=http://localhost:7474
      - NEO4J_USERNAME=${NEO4J_USERNAME:-neo4j}
      - NEO4J_PASSWORD=${NEO4J_PASSWORD:-neo4j123}
    restart: unless-stopped

  # ── MarlinSpike ─────────────────────────────────────────────
  # Aplicacion externa para analisis pasivo de PCAP: http://127.0.0.1:5001
  marlinspike:
    build:
      context: https://github.com/riverrisk/marlinspike.git
      args:
        MARLINSPIKE_DPI_REPO: ${MARLINSPIKE_DPI_REPO:-https://github.com/riverrisk/marlinspike-dpi.git}
        MARLINSPIKE_DPI_REF: ${MARLINSPIKE_DPI_REF:-de7ed06a28096a3da482831bc674ef0652c0e479}
        MARLINSPIKE_MITRE_REPO: ${MARLINSPIKE_MITRE_REPO:-https://github.com/riverrisk/marlinspike-mitre.git}
        MARLINSPIKE_MITRE_REF: ${MARLINSPIKE_MITRE_REF:-c3583ec2d189b8cde69f2160da6a5e8e5b643f7b}
        MARLINSPIKE_MALWARE_REPO: ${MARLINSPIKE_MALWARE_REPO:-https://github.com/riverrisk/marlinspike-malware.git}
        MARLINSPIKE_MALWARE_REF: ${MARLINSPIKE_MALWARE_REF:-4a008211cad7e56609e8a667b95f1c09b790c1b4}
        MARLINSPIKE_MALWARE_RULES_REPO: ${MARLINSPIKE_MALWARE_RULES_REPO:-https://github.com/riverrisk/marlinspike-malware-rules.git}
        MARLINSPIKE_MALWARE_RULES_REF: ${MARLINSPIKE_MALWARE_RULES_REF:-99cbe9358d0a5047d9b5e57a7e4ff5eafdee9bd4}
    container_name: arsenalot-marlinspike
    restart: unless-stopped
    ports:
      - "127.0.0.1:5001:5001"
    environment:
      - DATABASE_URL=postgresql://marlinspike:${MARLINSPIKE_DB_PASSWORD:-change-this-marlinspike-db-password}@marlinspike-db:5432/marlinspike
      - SECRET_KEY=${MARLINSPIKE_SECRET_KEY:-change-this-marlinspike-secret-key}
      - ADMIN_PASSWORD=${MARLINSPIKE_ADMIN_PASSWORD:-change-this-marlinspike-admin-password}
      - SESSION_COOKIE_SECURE=${MARLINSPIKE_SESSION_COOKIE_SECURE:-false}
      - PCAP_MAX_SIZE=${MARLINSPIKE_PCAP_MAX_SIZE:-5368709120}
      - PCAP_PROCESS_SIZE=${MARLINSPIKE_PCAP_PROCESS_SIZE:-5368709120}
      - MARLINSPIKE_UPLOAD_LIMIT_MB=${MARLINSPIKE_UPLOAD_LIMIT_MB:-1024}
      - MARLINSPIKE_DPI_BIN=/usr/local/bin/marlinspike-dpi
      - MARLINSPIKE_MALWARE_BIN=/opt/marlinspike-malware/bin/marlinspike-malware
      - MARLINSPIKE_MALWARE_RULES=/usr/share/marlinspike-malware/rules/packs
    command: ["sh", "-c", "python3 /app/arsenalot_patch_upload_limit.py && exec python3 app.py"]
    depends_on:
      marlinspike-db:
        condition: service_healthy
    volumes:
      - marlinspike_data:/app/data
      - ./docker/marlinspike/patch_upload_limit.py:/app/arsenalot_patch_upload_limit.py:ro
    networks:
      - marlinspike-net
    mem_limit: 3g

  marlinspike-db:
    image: postgres:16-alpine
    container_name: arsenalot-marlinspike-db
    restart: unless-stopped
    environment:
      - POSTGRES_USER=marlinspike
      - POSTGRES_PASSWORD=${MARLINSPIKE_DB_PASSWORD:-change-this-marlinspike-db-password}
      - POSTGRES_DB=marlinspike
    volumes:
      - marlinspike_pgdata:/var/lib/postgresql/data
    networks:
      - marlinspike-net
    mem_limit: 256m
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U marlinspike"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── PwnDoc ───────────────────────────────────────────────────
  # Acceso web: https://localhost:8443
  # Primera vez: docker-compose up -d --build  (tarda ~3-5 min compilando frontend)
  pwndoc-mongo:
    image: mongo:4.2.15
    container_name: pwndoc-mongo
    restart: unless-stopped
    volumes:
      - pwndoc_mongo_data:/data/db
    networks:
      - pwndoc-net
    # Limitar caché WiredTiger en entornos con poca RAM
    command: --wiredTigerCacheSizeGB 0.5

  pwndoc-backend:
    image: ghcr.io/pwndoc/pwndoc-backend:latest
    container_name: pwndoc-backend
    restart: unless-stopped
    depends_on:
      - pwndoc-mongo
    environment:
      - DB_SERVER=pwndoc-mongo
      - DB_NAME=pwndoc
    ports:
      - "127.0.0.1:4242:4242"   # API accesible desde arsenalot (network_mode: host)
    networks:
      - pwndoc-net

  pwndoc-frontend:
    image: ghcr.io/pwndoc/pwndoc-frontend:latest
    container_name: pwndoc-frontend
    restart: unless-stopped
    ports:
      - "8443:8443"   # UI: https://localhost:8443
    depends_on:
      - pwndoc-backend
    networks:
      - pwndoc-net

networks:
  pwndoc-net:
    driver: bridge
  marlinspike-net:
    driver: bridge

volumes:
  neo4j_data:
  neo4j_logs:
  marlinspike_data:
  marlinspike_pgdata:
  pwndoc_mongo_data:
