server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/javascript application/json;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(js|css|html|png|ico|svg)$ {
        expires 1h;
        add_header Cache-Control "public, max-age=3600";
    }
}
