<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ArsenalOT — Graph Viewer</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://unpkg.com/vis-network@9.1.9/styles/vis-network.min.css" rel="stylesheet"/>
    <script src="https://unpkg.com/vis-network@9.1.9/standalone/umd/vis-network.min.js"></script>
</head>
<body>
<div id="app">

    <!-- ══ HEADER ══ -->
    <header id="header">
        <div class="header-brand">
            <span class="brand-icon">⬡</span>
            <span class="brand-name">ArsenalOT<span class="brand-sep"> / </span><span class="brand-sub">Graph</span></span>
        </div>
        <div class="header-status">
            <span class="conn-dot disconnected" id="conn-dot"></span>
            <span id="conn-label">Conectando…</span>
            <button class="btn-sm" id="reconnect-btn" title="Reconectar">↺</button>
        </div>
    </header>

    <!-- ══ BODY ══ -->
    <div id="body">

        <!-- ─── LEFT PANEL ─── -->
        <aside id="left-panel" class="no-org">

            <!-- 1. Org selector -->
            <div class="panel-sec org-panel">
                <div class="sec-title">Organización</div>
                <select id="org-select" class="org-select" disabled>
                    <option value="">Conectando…</option>
                </select>
                <div id="org-hint" class="org-hint">Selecciona una organización</div>
            </div>

            <!-- 2. Node search -->
            <div class="panel-sec">
                <div class="sec-title">Buscar activo</div>
                <div class="search-row">
                    <input type="search" id="node-search" class="node-search"
                           placeholder="IP o hostname…" autocomplete="off">
                    <button class="btn-search" id="node-search-btn" title="Buscar">→</button>
                </div>
                <div id="search-hint" class="search-hint"></div>
            </div>

            <!-- 3. Preset queries (dropdown) -->
            <div class="panel-sec">
                <div class="sec-title">Consultas</div>
                <select id="query-select" class="query-select">
                    <option value="">— Seleccionar consulta —</option>
                    <option value="0">🗺️ Mapa de Visibilidad</option>
                    <option value="1">🌐 Mapa de Red Global</option>
                    <option value="2">🚨 Camino de Ataque</option>
                </select>
                <button class="btn-run" id="run-query-btn" disabled>▶ Ejecutar</button>
            </div>

            <!-- 4. View controls -->
            <div class="panel-sec view-panel">
                <div class="sec-title">Vista</div>
                <div class="view-row">
                    <button class="btn-xs" id="fit-btn">⊡ Centrar</button>
                    <button class="btn-xs-danger" id="clear-btn">✕ Limpiar</button>
                </div>
                <label class="toggle-row">
                    <input type="checkbox" id="physics-toggle" checked>
                    Física
                </label>
            </div>

            <!-- 5. Legend -->
            <div class="legend-panel">
                <div class="sec-title">Leyenda</div>
                <div id="legend-items"></div>
            </div>

        </aside>

        <!-- ─── GRAPH ─── -->
        <main id="graph-wrapper">
            <div id="graph-container"></div>

            <div id="graph-overlay" class="hidden">
                <div class="spinner"></div>
                <div id="overlay-msg">Ejecutando…</div>
            </div>

            <div id="graph-empty">
                <div class="empty-icon">◎</div>
                <div class="empty-text">Selecciona una consulta o busca un activo</div>
            </div>

            <div id="graph-stats">0 nodos · 0 relaciones</div>

            <div id="table-container" class="hidden">
                <div class="table-topbar">
                    <span id="table-label">Resultados</span>
                    <button class="btn-sm" id="back-to-graph-btn">← Grafo</button>
                </div>
                <div id="table-scroll"></div>
            </div>
        </main>

        <!-- ─── RIGHT PANEL ─── -->
        <aside id="right-panel" class="hidden">
            <div class="rp-header">
                <span class="type-pill node" id="rp-type-pill">Nodo</span>
                <button class="btn-close" id="rp-close">✕</button>
            </div>
            <div id="rp-labels"></div>
            <div id="rp-props"></div>
            <div class="rp-neighbors">
                <div class="sec-title">Contexto</div>
                <div class="neighbor-count" id="rp-context-text"></div>
            </div>
        </aside>

    </div>
</div>

<div id="custom-tooltip" class="custom-tooltip hidden"></div>

<script src="config.js"></script>
<script src="app.js"></script>
</body>
</html>
